<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ニコニコクリッカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=M+PLUS+Rounded+1c:wght@500;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>🎀 ニコニコクリッカー 🎀</h1>

    <div class="layout">
      <section class="click-side">
        <div class="coin-display">
          <span class="coin-label">所持コイン</span>
          <span id="coins" class="coin-value">0</span>
        </div>

        <div class="click-area">
          <button id="clickButton" class="click-button">
            <img src="nico-icon.png" alt="niconico icon" class="nico-icon-image" />
          </button>
          <div id="fallContainer" class="fall-container"></div>
        </div>

        <div class="mini-stats">
          <div class="mini-stat">
            <span class="mini-label">✨ クリック単価</span>
            <span id="perClick" class="mini-value">1</span>
          </div>
          <div class="mini-stat">
            <span class="mini-label">⏱ 自動収入</span>
            <span id="perSecond" class="mini-value">0</span>
          </div>
        </div>
      </section>

      <section class="upgrades">
        <h2>🛒 ショップ</h2>
        <button id="upgradeClick" class="upgrade-button">
          <span class="upgrade-icon">👆</span>
          <span class="upgrade-text">
            クリック力アップ
            <small>価格: <span id="upgradeClickCost">10</span> コイン</small>
          </span>
        </button>
        <button id="buyAuto" class="upgrade-button">
          <span class="upgrade-icon">🤖</span>
          <span class="upgrade-text">
            自動収入アップ
            <small>価格: <span id="buyAutoCost">50</span> コイン</small>
          </span>
        </button>
      </section>
    </div>

    <p class="hint">クリックしてコインを稼ごう！アップグレードで効率を上げられます💖</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
