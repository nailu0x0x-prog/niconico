<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ニコニコクリッカー</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1><img src="niconico.png" alt="ニコニコ" class="title-icon" />クリッカー</h1>

    <div class="layout">
      <section class="click-side">
        <div class="coin-display">
          <span class="coin-label">所持コイン</span>
          <span id="coins" class="coin-value">0</span>
        </div>

        <button id="openRanking" class="ranking-button">🏆 ランキング</button>

        <div class="click-area">
          <button id="clickButton" class="click-button">
            <img src="niconico.png" alt="niconico icon" class="nico-icon-image" />
          </button>
          <div id="fallContainer" class="fall-container"></div>
        </div>

        <div class="mini-stats">
          <div class="mini-stat">
            <span class="mini-label">✨ クリック単価</span>
            <span id="perClick" class="mini-value">1</span>
          </div>
          <div class="mini-stat">
            <span class="mini-label">⏱ 自動収入/秒</span>
            <span id="perSecond" class="mini-value">0</span>
          </div>
        </div>

        <section class="upgrades">
          <h2>🛒 強化</h2>
          <button id="upgradeClick" class="upgrade-button">
            <span class="upgrade-icon">👆</span>
            <span class="upgrade-text">
              クリック力アップ
              <small>価格: <span id="upgradeClickCost">10</span> コイン</small>
            </span>
          </button>
          <button id="buyAutoClicker" class="upgrade-button">
            <span class="upgrade-icon">🤖</span>
            <span class="upgrade-text">
              自動連打機
              <small>価格: <span id="autoClickCost">50000</span> コイン</small>
            </span>
          </button>
        </section>
      </section>

      <section class="factory-side">
        <h2>🏭 自動生産レーン</h2>
        <div id="factoryList" class="factory-list"></div>
      </section>
    </div>

    <p class="hint">クリックしてコインを稼ごう！自動生産レーンを増やして放置でもコインを稼げます💖</p>
  </main>

  <div id="audience" class="audience"></div>

  <div id="rankingModal" class="ranking-modal">
    <div class="ranking-box">
      <button id="closeRanking" class="ranking-close">✕</button>
      <h2>🏆 ランキング TOP10</h2>
      <ol id="rankingList" class="ranking-list"></ol>
      <form id="rankingForm" class="ranking-form">
        <input id="rankingName" type="text" maxlength="12" placeholder="名前を入力" required />
        <button type="submit">現在のコインで登録</button>
      </form>
      <p id="rankingMessage" class="ranking-message"></p>
    </div>
  </div>

  <video id="nikonikoVideo" src="nikoniko.mp4" class="nikoniko-video" muted playsinline></video>
  <canvas id="nikonikoCanvas" class="nikoniko-canvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
